<!doctype html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
*{margin:0;box-sizing:border-box}
html,body{height:100%;display:flex;flex-direction:column;background:#21232b;color:#dde1e8;font-family:-apple-system,'PingFang SC',sans-serif}

  padding:20px 22px;font:13.5px/1.75 "SF Mono",Menlo,Consolas,monospace}
#prev{flex:1;overflow:auto;padding:22px 28px;border-left:1px solid rgba(255,255,255,.07);

<div id="bar"><b>Markdown</b><span>左侧编写 · 右侧实时预览</span><span id="count"></span></div>
<div id="main"><textarea id="src" spellcheck="false"></textarea><div id="prev"></div></div>
<script>
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function inline(s){
  return s
    .replace(/`([^`]+)`/g,(_,c)=>'<code>'+c+'</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')
    .replace(/\*([^*]+)\*/g,'<i>$1</i>')
    .replace(/~~([^~]+)~~/g,'<del>$1</del>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noreferrer">$1</a>');
}
function md(src){
  const lines=src.split('\n');let out='',i=0,para=[];
  const flush=()=>{if(para.length){out+='<p>'+inline(para.join(' '))+'</p>';para=[]}};
  while(i<lines.length){
    let L=lines[i];
    if(/^```/.test(L)){flush();let code=[];i++;
      while(i<lines.length&&!/^```/.test(lines[i]))code.push(lines[i++]);
      i++;out+='<pre><code>'+esc(code.join('\n'))+'</code></pre>';continue}
    L=esc(L);
    let m;
    if(m=L.match(/^(#{1,3})\s+(.*)/)){flush();const n=m[1].length;out+=`<h${n}>`+inline(m[2])+`</h${n}>`;i++;continue}
    if(/^(-{3,}|\*{3,})\s*$/.test(L)){flush();out+='<hr>';i++;continue}
    if(/^&gt;\s?/.test(L)){flush();let q=[];
      while(i<lines.length&&/^>\s?/.test(lines[i]))q.push(esc(lines[i++]).replace(/^&gt;\s?/,''));
      out+='<blockquote>'+inline(q.join(' '))+'</blockquote>';continue}
    if(/^[-*]\s+/.test(L)){flush();let li=[];
      while(i<lines.length&&/^[-*]\s+/.test(lines[i]))li.push('<li>'+inline(esc(lines[i++]).replace(/^[-*]\s+/,''))+'</li>');
      out+='<ul>'+li.join('')+'</ul>';continue}
    if(/^\d+\.\s+/.test(L)){flush();let li=[];
      while(i<lines.length&&/^\d+\.\s+/.test(lines[i]))li.push('<li>'+inline(esc(lines[i++]).replace(/^\d+\.\s+/,''))+'</li>');
      out+='<ol>'+li.join('')+'</ol>';continue}
    if(/^\s*$/.test(L)){flush();i++;continue}
    para.push(L);i++;
  }
  flush();return out;
}
const src=document.getElementById('src'),prev=document.getElementById('prev');
function render(){
  prev.innerHTML=md(src.value);
  document.getElementById('count').textContent=src.value.length+' 字符';
}
src.addEventListener('input',render);
src.addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();
    const s=src.selectionStart;
    src.setRangeText('  ',s,src.selectionEnd,'end');render()}
});
src.value=`# Markdown 速记
